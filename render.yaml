services:
  - type: web
    name: ppt-automation-web
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9
      - key: JWT_SECRET_KEY
        generateValue: true
